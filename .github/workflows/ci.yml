# ═══════════════════════════════════════════════════════════════
# LysiaETIC — CI Pipeline (Lint + Build + Test)
# ✅ P1-4: Her push ve PR'da otomatik kontrol
# ═══════════════════════════════════════════════════════════════

name: CI — Lint & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "18"

jobs:
  # ── Backend Lint & Check ─────────────────────────────────────
  backend:
    name: Backend — Lint & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Check syntax (dry-run)
        run: node --check server.js

  # ── Frontend Lint & Build ────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
          REACT_APP_API_URL: ""

  # ── Docker Build Test ────────────────────────────────────────
  docker:
    name: Docker — Build Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t lysiaetic-backend:test ./backend

      - name: Build Frontend Image
        run: docker build -t lysiaetic-frontend:test ./frontend
        env:
          REACT_APP_API_URL: ""
