# Eski domainler → dashtock.com (kalıcı yönlendirme)
server {
    listen 80;
    listen [::]:80;
    server_name pazaryonet.com www.pazaryonet.com pazaryonetim.com www.pazaryonetim.com pazaryönetim.com www.pazaryönetim.com xn--pazarynetim-wfb.com www.xn--pazarynetim-wfb.com;
    return 301 https://dashtock.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pazaryonet.com www.pazaryonet.com pazaryonetim.com www.pazaryonetim.com pazaryönetim.com www.pazaryönetim.com xn--pazarynetim-wfb.com www.xn--pazarynetim-wfb.com;
    ssl_certificate /etc/letsencrypt/live/dashtock.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashtock.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://dashtock.com$request_uri;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name dashtock.com www.dashtock.com _;
    return 301 https://dashtock.com$request_uri;
}

# www → tek kanonik host (SEO)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.dashtock.com;
    ssl_certificate /etc/letsencrypt/live/dashtock.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashtock.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://dashtock.com$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    root /var/www/html;
    index index.html;
    server_name dashtock.com _;

    ssl_certificate /etc/letsencrypt/live/dashtock.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashtock.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location = /index.html {
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
        add_header Pragma 'no-cache';
        add_header Expires '0';
    }

    location /service-worker.js {
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
        add_header Pragma 'no-cache';
        add_header Expires '0';
    }

    location /manifest.json {
        add_header Cache-Control 'no-cache';
        types { application/manifest+json json; }
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control 'public, immutable';
    }

    location /icons/ {
        expires 30d;
        add_header Cache-Control 'public';
    }

    location /videos/ {
        expires 7d;
        add_header Cache-Control 'public';
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location /hepsiburada/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SEO — statik dosya (GSC robots.txt / sitemap.xml); yoksa backend yedek
    location = /robots.txt {
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "public, max-age=3600";
        try_files /robots.txt @seo_backend;
    }

    location = /sitemap.xml {
        default_type application/xml;
        charset utf-8;
        add_header Cache-Control "public, max-age=3600";
        try_files /sitemap.xml @seo_backend;
    }

    location @seo_backend {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
        try_files $uri $uri/ /index.html;
    }
}
