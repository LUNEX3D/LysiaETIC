<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <title>Dashtock — PWA ikon üretici</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 24px; background: #0f1419; color: #e2e8f0; }
        a { color: #a78bfa; }
        code { background: #1e293b; padding: 2px 8px; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>Dashtock ikonları</h1>
    <p>LE placeholder kaldırıldı. İkonları marka logosundan üretin:</p>
    <pre><code>cd frontend
npm install --save-dev sharp
node scripts/generate-pwa-icons.mjs</code></pre>
    <p>Ardından <code>npm run build</code> ve deploy.</p>
    <p>Geçici olarak tarayıcı sekmesi için <a href="/brand/dashtock-logo.svg">SVG favicon</a> kullanılır.</p>
</body>
</html>
