# ═══════════════════════════════════════════════════════════════
# LysiaETIC — CD Pipeline (AWS Deploy)
# main push → EC2'de git pull + pm2 + nginx
#
# GitHub → Settings → Secrets and variables → Actions:
#   AWS_SSH_KEY   — EC2 .pem içeriği (tam metin)
#   AWS_HOST      — EC2 IP veya DNS
#   AWS_USER      — ubuntu | ec2-user vb.
#
# Not: Secret'ları run: içinde ${{ secrets.X }} ile YAZMAYIN; sadece env: ile
# verin. Aksi halde çok satırlı anahtar / maskeleme boş script üretebilir.
# ═══════════════════════════════════════════════════════════════

name: CD — AWS Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
          REACT_APP_API_URL: ""

      - name: Setup SSH Key
        env:
          AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
          AWS_HOST: ${{ secrets.AWS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$AWS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$AWS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      # Boş secret + kırık satır devamı → ssh usage + exit 255
      - name: Verify EC2 connection settings
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
        run: |
          if [ -z "$AWS_HOST" ] || [ -z "$AWS_USER" ]; then
            echo "::error::AWS_HOST veya AWS_USER boş. Repo → Settings → Secrets → Actions içinde bu iki secret'ı ekleyin (EC2 IP ve kullanıcı adı)."
            exit 1
          fi
          if [ ! -s ~/.ssh/deploy_key ]; then
            echo "::error::SSH anahtarı boş — AWS_SSH_KEY secret'ına tam .pem içeriğini ekleyin."
            exit 1
          fi

      - name: Deploy Backend
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
        run: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$AWS_USER@$AWS_HOST" "cd ~/LysiaETIC && git pull origin main && cd backend && npm ci --omit=dev && pm2 restart backend"

      - name: Deploy Frontend
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
        run: |
          scp -r -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ./frontend/build/* "$AWS_USER@$AWS_HOST:~/build/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$AWS_USER@$AWS_HOST" "sudo rm -rf /var/www/html/* && sudo cp -r ~/build/* /var/www/html/ && sudo chmod -R 755 /var/www/html/ && sudo chown -R www-data:www-data /var/www/html/ && sudo systemctl restart nginx"

      - name: Health Check
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
        run: |
          sleep 10
          curl -f "http://$AWS_HOST/api/status" || echo "⚠️ Health check failed — sunucu henüz hazır olmayabilir"

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/deploy_key
