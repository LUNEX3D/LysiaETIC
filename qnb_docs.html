    <style>
      :root {
        --ink: #1e293b;
        --muted: #64748b;
        --border: #e2e8f0;
        --bg: #f8fafc;
        --card: #fff;
        --indigo-50: #eef2ff;
        --indigo-200: #c7d2fe;
        --font: "Mulish", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        --fs-base: 16.25px;
        --fs-small: 14px;
        --fs-title: 1.25rem;
        --fs-h2: 20px;
        --radius: 14px;
        --shadow: 0 6px 24px rgba(2, 6, 23, .06), 0 2px 6px rgba(2, 6, 23, .06);
        --content-max: 1140px;
      }

      * {
        box-sizing: border-box
      }

      html,
      body {
        height: 100%;
        margin: 0
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font);
        font-size: var(--fs-base);
        line-height: 1.65;
        font-weight: 400;
      }

      .page {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 18px
      }

      .brand img {
        height: 40px;
        display: block
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 10px
      }

      .search {
        width: 300px;
        max-width: 42vw
      }
	  .search-results {
  position: absolute;
  top: 110%;
  left: 0;
  right: 0;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  max-height: 260px;
  overflow-y: auto;
  z-index: 20;
  padding: 4px;
  display: none; /* varsayılan gizli */
}


  .fullscreen, .fullscreen-btn, [data-action="fullscreen"] { display: none !important; }


.search-result {
  width: 100%;
  text-align: left;
  border: 0;
  background: transparent;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  display: flex;
  flex-direction: column;
}

.search-result:hover {
  background: #f1f5f9;
}

.search-result-title {
  font-weight: 600;
  color: #111827;
}

.search-result-path {
  font-size: 0.8rem;
  color: #64748b;
}

      input[type="search"],
      select,
      .tab,
      .copy-btn {
        padding: 10px 12px;
        border-radius: 9999px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--ink);
        text-transform: uppercase;
        letter-spacing: .03em;
        font-weight: 600;
      }

      input[type="search"] {
        width: 100%;
        text-transform: none;
        letter-spacing: 0;
        font-weight: 400
      }

      .wrap {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 0;
        padding: 16px 0;
        align-items: start
      }

      .left {
        padding: 0 10px 0 16px;
        border-right: 1px solid var(--border)
      }

      .mid {
        padding: 0 16px
      }

      .acc-item+.acc-item {
        margin-top: 8px
      }

      .acc-btn {
        width: 100%;
        text-align: left;
        background: none;
        border: 0;
        padding: 10px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        font-weight: 400;
        font-size: var(--fs-h2);
        color: #45476f;
        border-radius: 12px
      }

      .acc-btn:hover {
        background: #f1f5f9
      }

      .acc-body {
        display: none;
        padding: 6px
      }

      .acc-body.open {
        display: block
      }

      .method button {
        width: 100%;
        text-align: left;
        padding: 10px 12px;
        background: transparent;
        border: 0;
        cursor: pointer;
        display: flex;
        gap: 10px;
        align-items: center;
        color: var(--ink);
        font-size: var(--fs-base);
        border-radius: 12px;
        margin: 2px 0
      }

      .method button:hover {
        background: #f1f5f9
      }

      .method button.active {
        background: var(--indigo-50);
        color: #1f2353
      }

      .mid-inner {
        max-width: var(--content-max);
        margin: 0 auto;
        padding: 18px 0;
        max-height: 650px;
      }

      .breadcrumbs {
        font-size: var(--fs-small);
        color: var(--muted)
      }
      #crumbs {
        display: none !important;
      }

      .title {
        font-size: var(--fs-title);
        font-weight: 800;
        color: #45476f;
        margin-top: 6px
      }

      .title-divider {
        height: 1px;
        background: var(--border);
        margin: 10px 0 14px
      }

      .desc {
        color: var(--muted);
        margin-top: 4px;
		font-size: 1.0625rem;
        line-height: 1.7
      }

      .doc-subtitle {
        margin: 14px 0 8px;
        color: #45476f;
        font-size: 1.05rem;
      }

      .doc-table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .doc-table th,
      .doc-table td {
        padding: 10px 12px;
        text-align: left;
        vertical-align: top;
        font-size: 0.95rem;
      }

      .doc-table thead th {
        background: #f8fafc;
        color: #334155;
        border-bottom: 1px solid var(--border);
      }

      .doc-table tbody tr+tr td {
        border-top: 1px solid #f1f5f9;
      }

      .urls-block {
        margin: 8px 0 2px;
      }

      .urls-title {
        font-weight: 800;
        font-size: 1.05rem;
        color: #45476f;
        margin: 12px 0 8px;
      }
      #mid-desc {
        max-height: 650px; /* açıklama alanı yüksekliği */
        overflow-y: auto;
        padding-right: 8px; /* scroll bar çakışmasını azaltır */
      }
      .urls-table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        overflow: hidden;
      }

      .urls-table th,
      .urls-table td {
        padding: 10px 12px;
        text-align: left;
        font-size: 0.96rem;
      }

      .urls-table thead th {
        background: #f8fafc;
        color: #334155;
        border-bottom: 1px solid #e2e8f0;
      }

      .urls-table tbody tr+tr td {
        border-top: 1px solid #f1f5f9;
      }

      .code-section {
        margin-top: 18px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--card);
        box-shadow: 0 6px 24px rgba(2, 6, 23, .06), 0 2px 6px rgba(2, 6, 23, .06)
      }

      .code-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border)
      }

      .tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap
      }

      .tab {
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: 9999px;
        background: var(--card);
        cursor: pointer;
        font-size: 12px;
        color: var(--ink)
      }

      .tab.active {
        border-color: var(--indigo-200);
        background: var(--indigo-50);
        color: #1f2353
      }
      .pane {
  padding: 12px;
  max-height: 420px; /* scroll yüksekliği */
  overflow: auto;    /* hem dikey hem yatay gerektiğinde */
}

.pane.hidden {
  display: none;
}

      pre.code {
        background: #0f172a;
        color: #e5e7eb;
        padding: 18px;
        border-radius: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13.5px;
        white-space: pre-wrap;
        word-break: break-word;
        min-height: 200px;
        border: 1px solid #11182733;
        background-image: linear-gradient(#0f172a 0 0), linear-gradient(#11182733 0 0);
        background-size: 100% 100%, 100% 28px;
        background-repeat: no-repeat, repeat;
        background-position: 0 0, 0 0;
      }

      @media (max-width:900px) {
        .wrap {
          grid-template-columns: 1fr
        }

        .left {
          border-right: none;
          padding: 0 16px
        }

        .mid {
          padding: 0 16px
        }

        .search {
          max-width: 52vw
        }
      }

import java.net.CookieManager;
import java.net.HttpURLConnection;
import java.net.URL;
import java.nio.charset.StandardCharsets;

public class SoapLoginClient {

    private final String serviceUrl;
    public SoapLoginClient(String serviceUrl) {
        this.serviceUrl = serviceUrl;

        CookieManager cookieManager = new CookieManager();
        CookieHandler.setDefault(cookieManager);
    }

    public void login(String username, String password) throws Exception {

        String soapXml =
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>" +
            "<soapenv:Envelope xmlns:soapenv=\"http://schemas.xmlsoap.org/soap/envelope/\" " +
            "xmlns:ser=\"http://service.csap.cs.com.tr/\">" +
            "<soapenv:Header/>" +
            "<soapenv:Body>" +
            "<ser:wsLogin>" +
            "<userId>" + username + "</userId>" +
            "<password>" + password + "</password>" +
            "<lang>tr</lang>" +
            "</ser:wsLogin>" +
            "</soapenv:Body>" +
            "</soapenv:Envelope>";

        URL url = new URL(serviceUrl);
        HttpURLConnection conn = (HttpURLConnection) url.openConnection();

        conn.setRequestMethod("POST");
        conn.setDoOutput(true);
        conn.setRequestProperty("Content-Type", "text/xml; charset=utf-8");
        conn.setRequestProperty("Accept", "text/xml");

        try (OutputStream os = conn.getOutputStream()) {
            os.write(soapXml.getBytes(StandardCharsets.UTF_8));
        }
        conn.getInputStream().close();
    }
}`

    private static void unzip(String zipFilePath, String destDir) {
        File dir = new File(destDir);
        // create output directory if it doesn't exist
        if(!dir.exists()) dir.mkdirs();
        FileInputStream fis;
        //buffer for read and write data to file
        byte[] buffer = new byte[1024];
        try {
            fis = new FileInputStream(zipFilePath);
            ZipInputStream zis = new ZipInputStream(fis);
            ZipEntry ze = zis.getNextEntry();
            while(ze != null){
                String fileName = ze.getName();
                File newFile = new File(destDir + File.separator + fileName);
                System.out.println("Unzipping to "+newFile.getAbsolutePath());
                //create directories for sub directories in zip
                new File(newFile.getParent()).mkdirs();
                FileOutputStream fos = new FileOutputStream(newFile);
                int len;
                while ((len = zis.read(buffer)) > 0) {
                fos.write(buffer, 0, len);
                }
                fos.close();
                //close this ZipEntry
                zis.closeEntry();
                ze = zis.getNextEntry();
            }
            //close last ZipEntry
            zis.closeEntry();
            zis.close();
            fis.close();
        } catch (IOException e) {
            e.printStackTrace();
        }
        
    }

    private static void unzip(String zipFilePath, String destDir) {
        File dir = new File(destDir);
        // create output directory if it doesn't exist
        if(!dir.exists()) dir.mkdirs();
        FileInputStream fis;
        //buffer for read and write data to file
        byte[] buffer = new byte[1024];
        try {
            fis = new FileInputStream(zipFilePath);
            ZipInputStream zis = new ZipInputStream(fis);
            ZipEntry ze = zis.getNextEntry();
            while(ze != null){
                String fileName = ze.getName();
                File newFile = new File(destDir + File.separator + fileName);
                System.out.println("Unzipping to "+newFile.getAbsolutePath());
                //create directories for sub directories in zip
                new File(newFile.getParent()).mkdirs();
                FileOutputStream fos = new FileOutputStream(newFile);
                int len;
                while ((len = zis.read(buffer)) > 0) {
                fos.write(buffer, 0, len);
                }
                fos.close();
                //close this ZipEntry
                zis.closeEntry();
                ze = zis.getNextEntry();
            }
            //close last ZipEntry
            zis.closeEntry();
            zis.close();
            fis.close();
        } catch (IOException e) {
            e.printStackTrace();
        }
        
    }

      function copyToClipboard(text) {
        if (!text) return;

        // Modern API (https veya localhost gibi güvenli ortamlarda)
        if (navigator.clipboard && window.isSecureContext) {
          return navigator.clipboard.writeText(text);
        }

        // Fallback: file:// gibi ortamlarda eski yöntem
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.top = "-9999px";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();

        try {
          document.execCommand("copy");
        } catch (e) {
          console.error("Fallback copy failed", e);
        } finally {
          document.body.removeChild(textarea);
        }

        // Fallback senaryosu senkron ama yine de Promise dönüyoruz
        return Promise.resolve();
      }

      copyBtn.addEventListener("click", () => {
        const text = codeEl.textContent || "";
        if (!text) return;

        copyToClipboard(text)
          .then(() => {
            const t = I18N[state.lang] || I18N.tr;
            copyBtn.textContent = t.copied;
            setTimeout(() => {
              copyBtn.textContent = t.copy;
            }, 1500);
          })
          .catch((err) => {
            console.error("Copy failed", err);
          });
      });

      
      <!--kod bloğu gizleme-->
      function toggleCodeSection() {
        if (state.activeMethod === "urls")
		{
          codeSection.style.display = "none";
        }
		else if (state.activeMethod === "flow")
		{
          codeSection.style.display = "none";
        }
		else if (state.activeMethod === "flowIncoming")
		{
          codeSection.style.display = "none";
        }
		else if (state.activeMethod === "invoiceLink")
		{
          codeSection.style.display = "none";
        }
		else if (state.activeMethod === "sendManual")
		{
          codeSection.style.display = "none";
        }
		else if (state.activeMethod === "flowService")
		{
          codeSection.style.display = "none";
        }
		else {
          codeSection.style.display = "";
        }	
		
        codePane.classList.toggle("hidden", !state.codeVisible);
      }

      function renderText() {
        const t = I18N[state.lang];
        const g = state.activeGroup;
        const m = state.activeMethod;

        const crumbsGroup = (t.crumbs && t.crumbs[g]) || {};
        const titlesGroup = (t.titles && t.titles[g]) || {};
        const descGroup = (t.desc && t.desc[g]) || {};

        if (crumbs) {
          crumbs.textContent = crumbsGroup[m] || "";
        }
        midTitle.textContent = titlesGroup[m] || "";
        midDesc.innerHTML = descGroup[m] || "";

        document.documentElement.lang = state.lang;
        toggleCodeSection();
        copyBtn.textContent = t.copy;
        const searchEl = document.getElementById("search");
        if (searchEl) {
          searchEl.placeholder = t.searchPlaceholder;
        }
      }

      function renderCode() {
        const key = state.activeTab || "soapui";
        const raw = safeContent(state.contentMap, key);

        // Varsayılan dili belirle
        let lang = "plaintext";
        if (key === "soapui") {
          lang = "xml";
        } else if (key === "csharp") {
          lang = "csharp";
        } else if (key === "java") {
          lang = "java";
        }

        let html = raw;

        // highlight.js varsa, string üzerinden renklendir
        if (window.hljs) {
          try {
            html = hljs.highlight(raw, { language: lang }).value;
          } catch (e) {
            // Dil bulunamazsa otomatik algıla
            try {
              html = hljs.highlightAuto(raw).value;
            } catch (e2) {
              html = raw;
            }
          }
        }

        // Kod içeriğini HTML olarak yerleştir
        codeEl.innerHTML = html;

        // Class'ları sabitle (tema için)
        codeEl.classList.remove("language-xml", "language-csharp", "language-java", "hljs");
        codeEl.classList.add("hljs", `language-${lang}`);
      }

      function setActiveTabByLabel(label) {
        const key = normalizeLang(label);
        state.activeTab = key;
        document.querySelectorAll(".tab").forEach(btn => {
          btn.classList.toggle("active", normalizeLang(btn.dataset.label) === key);
        });
        if (!state.codeVisible) {
          state.codeVisible = true;
          toggleCodeSection();
        }
        renderCode();
      }
      tabsEl.addEventListener("click", (e) => {
        const btn = e.target.closest(".tab");
        if (!btn) return;
        setActiveTabByLabel(btn.dataset.label);
      });
      document.querySelectorAll(".acc-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.acc;
          const body = document.querySelector(`[data-acc-body="${id}"]`);
          const isOpen = body.classList.toggle("open");
          btn.classList.toggle("open", isOpen);
      });
        });
      document.querySelectorAll('.method button').forEach(btn => 
	  {
  btn.addEventListener("click", () => {
    const group = btn.dataset.group;
    const method = btn.dataset.method;

    state.activeGroup = group;
    state.activeMethod = method;

    const libKey = `${group}_${method}`;
    state.contentMap = CODE_LIBRARY[libKey] || {
      soapui: "",
      csharp: "",
      java: ""
    };

    // Sol menüde aktif butonu işaretle
    document.querySelectorAll('.method button')
      .forEach(b => b.classList.toggle("active", b === btn));

    // 1) Kod alanı görünür olsun
    state.codeVisible = true;

    // 2) Önce metinleri güncelle
    renderText();

    // 3) Varsayılan olarak SoapUI sekmesini seç
    setActiveTabByLabel("SoapUI");
  });
});
      if (langSel) {
        langSel.addEventListener("change", () => {
          renderText();
          if (state.codeVisible) renderCode();
        });
      }
if (searchInput) {
  searchInput.addEventListener("input", () => {
    const raw = searchInput.value || "";
    const q = raw.trim().toLowerCase();

    // Arama kutusu boşaldıysa, Başlangıç / Genel Açıklamalar'a dön
    if (!q) {
      const defaultBtn = document.querySelector('.method button[data-group="start"][data-method="overview"]');
      if (defaultBtn) {
        defaultBtn.click();
        // İlgili accordion'u da aç
        const defaultBody = defaultBtn.closest(".acc-body");
        if (defaultBody) {
          const accId = defaultBody.getAttribute("data-acc-body");
          defaultBody.classList.add("open");
          const accBtn = document.querySelector('.acc-btn[data-acc="' + accId + '"]');
          if (accBtn) {
            accBtn.classList.add("open");
          }
        }
      }
      return;
    }

    const langKey = state.lang || "tr";
    const langData = I18N[langKey] || I18N.tr;
    const titles = (langData && langData.titles) || {};
    const descAll = (langData && langData.desc) || {};

    outer: for (const group in titles) {
      if (!Object.prototype.hasOwnProperty.call(titles, group)) continue;
      const methods = titles[group] || {};
      for (const method in methods) {
        if (!Object.prototype.hasOwnProperty.call(methods, method)) continue;
        const title = (methods[method] || "").toLowerCase();
        const desc = (((descAll[group] || {})[method]) || "").toLowerCase();
        if (title.includes(q) || desc.includes(q)) {
          const btn = document.querySelector(
            '.method button[data-group="' + group + '"][data-method="' + method + '"]'
          );
          if (btn) {
            // İlgili accordion'u aç
            const body = btn.closest(".acc-body");
            if (body) {
              const accId = body.getAttribute("data-acc-body");
              // Tüm acc-body'leri kapat
              document.querySelectorAll(".acc-body").forEach(b => b.classList.remove("open"));
              document.querySelectorAll(".acc-btn").forEach(b => b.classList.remove("open"));
              // Hedef acc-body ve başlığını aç
              body.classList.add("open");
              const accBtn = document.querySelector('.acc-btn[data-acc="' + accId + '"]');
              if (accBtn) {
                accBtn.classList.add("open");
              }
            }
            btn.click(); // mevcut click mantığını kullan
            // Sol tarafta ilgili method görünür olsun diye scrollIntoView
            btn.scrollIntoView({ block: "nearest", behavior: "smooth" });
          }
          break outer;
        }
      }
    }
	
	
	
	
    // Eşleşme yoksa herhangi bir değişiklik yapmıyoruz; son seçili ekran kalır
  });
}		 document.getElementById("mid-desc").addEventListener("click", function (e) {

    const group = link.dataset.group;

    const btn = document.querySelector(
      '.method button[data-group="' + group + '"][data-method="' + method + '"]'
    );

    if (btn) {
      btn.click(); // Zaten tüm state değişimi bu click ile yönetiliyor
      // Sol menüde görünür olsun istersen:
      btn.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }
  });
      // Initial render
      renderText();
