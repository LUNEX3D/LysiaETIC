# ═══════════════════════════════════════════════════════════════
# LysiaETIC Frontend — Nginx Docker Config
# ✅ WEB APP FIRST: Gzip/Brotli, SPA routing, cache, security
# ✅ Cross-platform: Mobile, Tablet, Desktop optimized
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Sıkıştırma (tüm cihazlar için) ──
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        application/wasm
        font/woff2
        application/manifest+json;

    # ── Güvenlik Header'ları ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # ✅ Permissions Policy — control device features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;

    # ── index.html — asla cache'leme (SPA routing için kritik) ──
    location = /index.html {
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
        add_header Pragma 'no-cache';
        add_header Expires '0';
    }

    # ── Service Worker — asla cache'leme ──
    location = /service-worker.js {
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
        add_header Pragma 'no-cache';
        add_header Expires '0';
        add_header Service-Worker-Allowed '/';
    }

    # ── Manifest — kısa cache ──
    location = /manifest.json {
        add_header Cache-Control 'no-cache';
        types { application/manifest+json json; }
    }

    # ── Static assets — uzun süreli cache (hashed filenames) ──
    location /static/ {
        expires 1y;
        add_header Cache-Control 'public, immutable';
        # ✅ CORS for font loading from CDN
        add_header Access-Control-Allow-Origin '*';
    }

    # ── Icons & Images — orta süreli cache ──
    location /icons/ {
        expires 30d;
        add_header Cache-Control 'public';
    }

    # ── Fonts — uzun süreli cache ──
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control 'public, immutable';
        add_header Access-Control-Allow-Origin '*';
    }

    # ── Images — orta süreli cache ──
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control 'public';
    }

    # ── API Proxy — backend container'a yönlendir ──
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        # ✅ Larger body size for file uploads from mobile
        client_max_body_size 50M;
    }

    # ── Swagger Docs Proxy ──
    location /api-docs {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── SPA Fallback — tüm route'ları index.html'e yönlendir ──
    location / {
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
        try_files $uri $uri/ /index.html;
    }

    # ── Error pages ──
    error_page 404 /index.html;
    error_page 500 502 503 504 /offline.html;
}
