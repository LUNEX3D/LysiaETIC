<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<script>
// Bu dosyayı tarayıcıda açarak PWA ikonlarını oluşturabilirsiniz.
// Her bir ikonu sağ tıklayıp "Resmi farklı kaydet" ile kaydedin.
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
sizes.forEach(size => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    // Background gradient
    const gradient = ctx.createLinearGradient(0, 0, size, size);
    gradient.addColorStop(0, '#0f766e');
    gradient.addColorStop(1, '#0ea5e9');
    ctx.fillStyle = gradient;

    // Rounded rect
    const r = size * 0.18;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fill();

    // Text "LE"
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${size * 0.38}px "Space Grotesk", "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('LE', size / 2, size / 2);

    // Display
    const img = document.createElement('img');
    img.src = canvas.toDataURL('image/png');
    img.style.margin = '10px';
    img.title = `icon-${size}x${size}.png`;

    const link = document.createElement('a');
    link.href = canvas.toDataURL('image/png');
    link.download = `icon-${size}x${size}.png`;
    link.appendChild(img);

    const label = document.createElement('div');
    label.textContent = `icon-${size}x${size}.png (Tıklayarak indirin)`;
    label.style.textAlign = 'center';

    const container = document.createElement('div');
    container.style.display = 'inline-block';
    container.style.margin = '10px';
    container.appendChild(link);
    container.appendChild(label);
    document.body.appendChild(container);
});
</script>
</body>
</html>
