# ═══════════════════════════════════════════════════════════════
# LysiaETIC — CD Pipeline (AWS Deploy)
# ✅ P1-4: main branch'e push yapıldığında otomatik deploy
#
# Gerekli GitHub Secrets:
#   AWS_SSH_KEY        — EC2 SSH private key (PEM)
#   AWS_HOST           — EC2 IP adresi (ör: 13.51.158.124)
#   AWS_USER           — EC2 kullanıcı adı (ör: ubuntu)
# ═══════════════════════════════════════════════════════════════

name: CD — AWS Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── Secrets kontrolü (boş AWS_HOST / bozuk key en sık hata) ──
      - name: Check deployment secrets
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
        run: |
          set -e
          missing=""
          [ -z "$AWS_HOST" ] && missing="$missing AWS_HOST"
          [ -z "$AWS_USER" ] && missing="$missing AWS_USER"
          [ -z "$AWS_SSH_KEY" ] && missing="$missing AWS_SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Repo → Settings → Secrets and variables → Actions: şu secret'lar boş veya tanımsız:$missing"
            exit 1
          fi
          key_len=${#AWS_SSH_KEY}
          if [ "$key_len" -lt 80 ]; then
            echo "::error::AWS_SSH_KEY çok kısa. .pem dosyasının tamamını (-----BEGIN ... PRIVATE KEY----- ile -----END ...----- arası) tek secret olarak yapıştırın."
            exit 1
          fi

      # ── Frontend Build ──
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
          REACT_APP_API_URL: ""

      # ── SSH: adımları ayır (logda hangi satırın patladığı net olsun; $HOME kullan) ──
      - name: SSH — create directory
        run: mkdir -p "$HOME/.ssh"

      - name: SSH — write private key
        env:
          AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
        run: |
          printf '%s\n' "$AWS_SSH_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          if [ ! -s "$HOME/.ssh/deploy_key" ]; then
            echo "::error::SSH anahtar dosyası boş yazıldı. Secret adı AWS_SSH_KEY ve tam PEM içeriği olduğundan emin olun."
            exit 1
          fi

      - name: SSH — known_hosts (isteğe bağlı)
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
        continue-on-error: true
        run: ssh-keyscan -T 15 -H "$AWS_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null

      # ── Backend Deploy (Git Pull + PM2 Restart) ──
      - name: Deploy Backend
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -o StrictHostKeyChecking=no \
            "$AWS_USER@$AWS_HOST" \
            "cd ~/LysiaETIC && git pull origin main && cd backend && npm ci --omit=dev && pm2 restart backend"

      # ── Frontend Deploy (SCP + Nginx) ──
      - name: Deploy Frontend
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
        run: |
          scp -r -i "$HOME/.ssh/deploy_key" -o StrictHostKeyChecking=no \
            ./frontend/build/* \
            "$AWS_USER@$AWS_HOST:~/build/"

          ssh -i "$HOME/.ssh/deploy_key" -o StrictHostKeyChecking=no \
            "$AWS_USER@$AWS_HOST" \
            "sudo rm -rf /var/www/html/* && sudo cp -r ~/build/* /var/www/html/ && sudo chmod -R 755 /var/www/html/ && sudo chown -R www-data:www-data /var/www/html/ && sudo systemctl restart nginx"

      # ── Health Check ──
      - name: Health Check
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
        run: |
          sleep 10
          curl -f "http://$AWS_HOST/api/status" || echo "⚠️ Health check failed — sunucu henüz hazır olmayabilir"

      # ── Cleanup ──
      - name: Cleanup SSH Key
        if: always()
        run: rm -f "$HOME/.ssh/deploy_key"
